version: '3.8'

services:

  db:
    image: mysql:latest
    container_name: SQL_DB
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: gestion_oficinas_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  backend:
    build: .
    container_name: backend_oficinas
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/gestion_oficinas_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root1234
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql-data: