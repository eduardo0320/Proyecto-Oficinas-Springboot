spring.application.name=backend
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/gestion_oficinas_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


springdoc.swagger-ui.enabled=true

#ruta personalizada para swagger ui
springdoc.swagger-ui.path=/swagger-ui.html


app.jwt.secret=${JWT_SECRET:03200320032003200320032003200320032003200320032003200320032003200320032003200320032003200320032003200320032003200320032003200320}
app.jwt.expiration-ms=3600000

app.seed.admin-password=${SEED_ADMIN_PASSWORD:changeit}
app.seed.registrador-password=${SEED_REGISTRADOR_PASSWORD:changeit}
app.seed.visor-password=${SEED_VISOR_PASSWORD:changeit}

